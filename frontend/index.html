<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1621" />
    <title>Chatify — Real-time Messaging</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
    // Apply stored theme BEFORE React hydrates (prevents flash)
    try {
      const THEMES = {
        default:  {"--accent":"#00a884","--bg-primary":"#050508","--bg-secondary":"#0c0d14","--bg-panel":"#11121d","--bg-header":"#161726","--bg-input":"#0d0d12","--bubble-mine":"#005c4b","--bubble-theirs":"#202c33","--text-primary":"#e9edef","--text-secondary":"#8696a0","--text-muted":"#667781","--border":"rgba(255,255,255,0.08)","--accent-dim":"rgba(0,168,132,0.15)","--bg-active":"rgba(0,168,132,0.10)","--bg-hover":"rgba(255,255,255,0.05)"},
        ocean:    {"--accent":"#63b3ed","--bg-primary":"#0a0f1e","--bg-secondary":"#0d1630","--bg-panel":"#111d3a","--bg-header":"#162347","--bg-input":"#1a2c58","--bubble-mine":"#1a3a5c","--bubble-theirs":"#0f1e3a","--text-primary":"#e2ecf9","--text-secondary":"#7da8c8","--text-muted":"#3a5472","--border":"rgba(99,179,237,0.08)","--accent-dim":"rgba(99,179,237,0.15)","--bg-active":"rgba(99,179,237,0.12)","--bg-hover":"rgba(99,179,237,0.06)"},
        forest:   {"--accent":"#68d391","--bg-primary":"#0b1512","--bg-secondary":"#101e18","--bg-panel":"#152619","--bg-header":"#1a2e1e","--bg-input":"#1f3825","--bubble-mine":"#1a3d24","--bubble-theirs":"#122018","--text-primary":"#e2f0e8","--text-secondary":"#7aab8a","--text-muted":"#3a5c44","--border":"rgba(72,187,120,0.08)","--accent-dim":"rgba(72,187,120,0.15)","--bg-active":"rgba(72,187,120,0.12)","--bg-hover":"rgba(72,187,120,0.06)"},
        sunset:   {"--accent":"#f6875a","--bg-primary":"#1a0f0a","--bg-secondary":"#261510","--bg-panel":"#301b14","--bg-header":"#3a2118","--bg-input":"#472820","--bubble-mine":"#4a2010","--bubble-theirs":"#2a1810","--text-primary":"#f2e0d8","--text-secondary":"#c47d5a","--text-muted":"#6a3a26","--border":"rgba(246,135,85,0.08)","--accent-dim":"rgba(246,135,85,0.15)","--bg-active":"rgba(246,135,85,0.12)","--bg-hover":"rgba(246,135,85,0.06)"},
        purple:   {"--accent":"#9f7aea","--bg-primary":"#0e0b1a","--bg-secondary":"#130f24","--bg-panel":"#1a152e","--bg-header":"#211a38","--bg-input":"#2a2245","--bubble-mine":"#2d1f5e","--bubble-theirs":"#1a1530","--text-primary":"#ede8f9","--text-secondary":"#9070c4","--text-muted":"#4a3672","--border":"rgba(159,122,234,0.08)","--accent-dim":"rgba(159,122,234,0.15)","--bg-active":"rgba(159,122,234,0.12)","--bg-hover":"rgba(159,122,234,0.06)"},
        rose:     {"--accent":"#f56588","--bg-primary":"#1a0d12","--bg-secondary":"#241018","--bg-panel":"#2e1520","--bg-header":"#391a28","--bg-input":"#452030","--bubble-mine":"#4a1a2e","--bubble-theirs":"#2a1020","--text-primary":"#f5e0e8","--text-secondary":"#c46080","--text-muted":"#6a3048","--border":"rgba(245,101,136,0.08)","--accent-dim":"rgba(245,101,136,0.15)","--bg-active":"rgba(245,101,136,0.12)","--bg-hover":"rgba(245,101,136,0.06)"},
        arctic:   {"--accent":"#76e0f4","--bg-primary":"#0c1419","--bg-secondary":"#101c24","--bg-panel":"#15242e","--bg-header":"#1a2c38","--bg-input":"#1f3545","--bubble-mine":"#1a3d4a","--bubble-theirs":"#12242e","--text-primary":"#e0f2f8","--text-secondary":"#6aabbc","--text-muted":"#365e6a","--border":"rgba(118,224,244,0.07)","--accent-dim":"rgba(118,224,244,0.15)","--bg-active":"rgba(118,224,244,0.10)","--bg-hover":"rgba(118,224,244,0.05)"},
        mono:     {"--accent":"#e0e0e0","--bg-primary":"#0a0a0a","--bg-secondary":"#111111","--bg-panel":"#1a1a1a","--bg-header":"#202020","--bg-input":"#2a2a2a","--bubble-mine":"#303030","--bubble-theirs":"#1e1e1e","--text-primary":"#f0f0f0","--text-secondary":"#888888","--text-muted":"#404040","--border":"rgba(255,255,255,0.06)","--accent-dim":"rgba(224,224,224,0.12)","--bg-active":"rgba(255,255,255,0.08)","--bg-hover":"rgba(255,255,255,0.04)"},
      };
      const key = localStorage.getItem("chatify-theme") || "default";
      const vars = THEMES[key] || THEMES.default;
      const root = document.documentElement;
      Object.entries(vars).forEach(([k, v]) => root.style.setProperty(k, v));
      const fsize = localStorage.getItem("chatify-fontsize");
      if (fsize) { const m = {small:"14px",medium:"16px",large:"18px"}; root.style.fontSize = m[fsize] || "16px"; }
    } catch(e) {}
  </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
